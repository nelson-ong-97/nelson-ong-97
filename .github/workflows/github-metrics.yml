name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nelson-ong-97
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata

          # Include private contributions in the counts
          base_indepth: yes

          # Languages — detailed breakdown with percentages
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_ignored: >-
            html, css, less, dockerfile, makefile, shell
          plugin_languages_limit: 8

          # Isometric commit calendar — full year 3D view
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Contribution calendar — flat yearly heatmaps (full history)
          plugin_calendar: yes
          plugin_calendar_limit: 0

          # Lines of code changed
          plugin_lines: yes

          # Timezone
          config_timezone: Asia/Ho_Chi_Minh